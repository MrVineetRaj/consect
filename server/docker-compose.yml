name: Consect Server
services:
  database:
    image: postgres:18
    container_name: consect-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/

  caching:
    image: redis:8.2
    container_name: consect-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  vector_db:
    image: qdrant/qdrant:v1.11.0
    container_name: consect-qdrant
    ports:
      - "6333:6333"
    volumes:
      - vector_db_data:/var/lib/qdrant

volumes:
  postgres_data:
  redis_data:
  vector_db_data:
